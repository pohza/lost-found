version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: lostfound-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-lostfound}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: lostfound-api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-lostfound}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      PASSWORD_RESET_RETURN_LINK: ${PASSWORD_RESET_RETURN_LINK:-}
    volumes:
      - api_uploads:/app/uploads

  frontend:
    build: .
    container_name: lostfound-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
  api_uploads: